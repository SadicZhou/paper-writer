# Paper Writer — Nginx Configuration
# 部署路径: /etc/nginx/sites-available/paper-writer

upstream nestjs_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name your-domain.com;          # ← 替换为实际域名

    # 上传限制
    client_max_body_size 50m;

    # ── Studio 前台 (用户论文写作) ──
    # 访问: http://your-domain.com/
    location / {
        root /opt/paper-writer/packages/studio/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Admin 后台管理 ──
    # 访问: http://your-domain.com/admin/
    location /admin {
        alias /opt/paper-writer/packages/admin-panel/dist;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # ── API 后端 ──
    location /api {
        proxy_pass http://nestjs_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 长连接
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # SSE 端点特殊处理
        location /api/v1/events {
            proxy_pass http://nestjs_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }

    # ── Swagger 文档 ──
    location /api-docs {
        proxy_pass http://nestjs_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}

